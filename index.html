<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Móvil - El último en πe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

  <h1>El último en pi e</h1>

<!--firebase-->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBPpKax_7zzPteOtnnutKX6anU6xqgfoMw",
      authDomain: "el-ultimo-en-pie-matematikos.firebaseapp.com",
      projectId: "el-ultimo-en-pie-matematikos",
      storageBucket: "el-ultimo-en-pie-matematikos.firebasestorage.app",
      messagingSenderId: "984317427914",
      appId: "1:984317427914:web:c9fcf803d20186494b3433"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
  </script>
<!-- Selección de personaje -->
  <div id="screenSelect"></div>

<!-- Marcador -->  
  <div id="screenGame" style="display:none;">
    <h2 id="playerName" style="border-bottom: 1px dashed #555; padding-bottom: 5px;"></h2>
    
    <div>
      <strong>Status.</strong> En la clasificación actual, tu puntuación acumulada es \(S = \) <span id="score" style="font-weight: bold;">0</span> pts, 
      lo que te sitúa en la posición <span id="rankingPosition" style="font-weight: bold;">#--</span> del grupo.
      <p id="nextPlayerInfo" style="margin: 8px 0 0 0; color: #333;"></p>
    </div>

    <h3 style="margin-top: 30px; text-align: center; letter-spacing: 0.5px;">Clasificación General</h3>
    <table>
      <thead>
        <tr>
          <th>Pos</th>
          <th>Participante</th>
          <th>Puntuación</th>
        </tr>
      </thead>
      <tbody id="listaRankingCompleta">
        </tbody>
    </table>
  </div>

  <div id="screenMap" style="display:none;">
    <div id="map" style="height: 400px; width: 100%;"></div>
    <button class="latex-button" onclick="sendGuess()">Enviar respuesta</button>
  </div>

  <p id="status" style="font-style: italic; text-align: center; margin-top: 20px;"></p>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
